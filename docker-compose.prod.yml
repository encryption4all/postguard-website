services:
  # Cryptify for filesharing
  cryptify-fileshare:
    image: ghcr.io/encryption4all/cryptify-backend:edge
    container_name: postguard-cryptify-fileshare
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    ports:
      - "8000:8000"
    volumes:
      - cryptify-data:/app/data
    networks:
      - postguard
    restart: unless-stopped
    depends_on:
      postguard-pkg:
        condition: service_healthy

  # PKG service (Private Key Generator)
  postguard-pkg:
    image: ghcr.io/encryption4all/postguard:edge
    container_name: postguard-pkg
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 5s
    ports:
      - "8087:8087"
    networks:
      - postguard
    restart: unless-stopped
    depends_on:
      - irma-server

  # IRMA/Yivi server
  irma-server:
    image: ghcr.io/privacybydesign/irma:latest
    container_name: postguard-irma-server
    # Replace localhost with your host machine's IP or domain for Yivi mobile app access
    command: server --no-auth --url http://localhost:8088 --jwt-privkey-file /etc/irma/jwt_privkey.pem
    ports:
      - "8088:8088"
    volumes:
      - ./docker/irma/jwt_privkey.pem:/etc/irma/jwt_privkey.pem:ro
    networks:
      - postguard
    restart: unless-stopped

  # Email testing tool
  mailcrab:
    image: marlonb/mailcrab:latest
    container_name: postguard-mailcrab
    ports:
      - "1080:1080"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - postguard
    restart: unless-stopped

  # PostGuard website
  postguard-website:
    image: ghcr.io/encryption4all/postguard-website:edge
    container_name: postguard-website-prod
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    networks:
      - postguard
    restart: unless-stopped
    depends_on:
      cryptify-fileshare:
        condition: service_healthy
      postguard-pkg:
        condition: service_healthy
      irma-server:
        condition: service_started
      mailcrab:
        condition: service_started

networks:
  postguard:
    driver: bridge

volumes:
  cryptify-data:
