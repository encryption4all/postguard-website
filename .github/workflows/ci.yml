name: CI
#
# Pipeline overview
# =================
#
# Release-please and Docker delivery are combined in one workflow because
# GITHUB_TOKEN-created tags do not trigger new workflow runs. This means a
# versioned Docker image must be built in the same run that release-please
# creates the release, using its job outputs to pass the version through.
#

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  # Run svelte-check for type errors and warnings.
  svelte-check:
    name: Svelte Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx svelte-kit sync
      - run: npx svelte-check --threshold warning

  # Run the Vitest unit tests (src/**). test:unit runs svelte-kit sync itself,
  # so it is self-contained from a bare npm ci.
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  # Run prettier --check, eslint, and stylelint.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx svelte-kit sync
      - run: npm run lint
      # Fail on references to undefined CSS custom properties (e.g. typo'd --pg-* tokens).
      - run: npm run lint:css

  # Validate the nginx configs with crossplane (NGINX Inc.'s syntax parser).
  # `nginx -t` is not usable here: the prod nginx.conf load_module's brotli
  # (present only in the built image) and the dev config's direct proxy_pass
  # hostnames make `nginx -t` fail on DNS. crossplane checks directive
  # syntax/arg-count/context without loading modules or resolving hosts, so it
  # catches e.g. a malformed add_header or a brace mismatch in these files.
  nginx:
    name: nginx config test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install crossplane

      # Dev config is a full standalone nginx.conf; --single-file skips the
      # include of /etc/nginx/mime.types (absent in CI, not a syntax concern).
      - name: Validate docker/nginx.dev.conf
        run: |
          crossplane parse --single-file -o /tmp/dev.json docker/nginx.dev.conf
          python -c "import json,sys; d=json.load(open('/tmp/dev.json')); [print('::error file=docker/nginx.dev.conf,line={}::{}'.format(e.get('line'), e['error'])) for e in d.get('errors', [])]; sys.exit(0 if d['status']=='ok' else 1)"

      # Prod server template is rendered by the image's envsubst entrypoint into
      # conf.d at runtime; render its two upstream vars and wrap in http{} so it
      # is parsed in the same context it actually runs in.
      - name: Validate docker/default.conf.template
        run: |
          IRMA_UPSTREAM_URL=http://irma-server:8088 PKG_UPSTREAM_URL=http://postguard-pkg:8087 \
            envsubst '${IRMA_UPSTREAM_URL} ${PKG_UPSTREAM_URL}' < docker/default.conf.template > /tmp/server.conf
          { echo 'events {}'; echo 'http {'; cat /tmp/server.conf; echo '}'; } > /tmp/prod-nginx.conf
          crossplane parse -o /tmp/prod.json /tmp/prod-nginx.conf
          python -c "import json,sys; d=json.load(open('/tmp/prod.json')); [print('::error file=docker/default.conf.template::{}'.format(e['error'])) for e in d.get('errors', [])]; sys.exit(0 if d['status']=='ok' else 1)"

  # Create a GitHub release (and tag) when conventional commits warrant one.
  release-please:
    name: Release Please
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node

  # Build each platform on its native runner and push by digest (no tag yet).
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            name: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            name: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge platform digests into a single multi-platform manifest and apply tags.
  # - push to main (no release)  → ghcr.io/.../postguard-website:edge
  # - push to main (release)     → ghcr.io/.../postguard-website:edge + :1.2.3
  # - pull request               → ghcr.io/.../postguard-website:pr-123
  finalize:
    name: Finalize Docker manifest
    needs: [build, release-please]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=edge,branch=main
            type=ref,event=pr
            type=raw,value=${{ needs.release-please.outputs.version }},enable=${{ needs.release-please.outputs.release_created == 'true' }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
